<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Xbox Achievement — Achievement Badges for Jellyfin</title>
<style>
  html,body{height:100%;margin:0;background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

  /* ============================================================
     VERBATIM PORT of Uenify's CodePen "Xbox One Achievement in
     CSS (Regular and Rare)" — https://codepen.io/uenify/pen/KxzKVd
     Trimmed to regular mode only (no rare sparkle spritesheet)
     and auto-triggered on load so it loops forever.
     ============================================================ */
  .achievement *{box-sizing:border-box;}
  .achievement{position:relative;pointer-events:none;width:100%;}

  @keyframes rotate{0%{transform:rotateY(0deg);}50%{transform:rotateY(360deg);}100%{transform:rotateY(0deg);}}

  @keyframes scale_circle_1{
    0%  {transform:scale3d(0,0,0);}
    2%  {opacity:1;}
    5%  {transform:scale3d(1,1,1);opacity:.8;}
    6%  {opacity:0;}
    9%  {opacity:0;}
    10% {transform:scale3d(1,1,1);opacity:0;}
    90% {transform:scale3d(0,0,0);}
    92% {opacity:1;}
    95% {transform:scale3d(1,1,1);opacity:.8;}
    96% {opacity:0;}
    99% {opacity:0;}
    100%{transform:scale3d(1,1,1);opacity:0;}
  }

  @keyframes circle_grow_move{
    1%  {opacity:0;transform:scale(.1);}
    4%  {transform:scale(1.1);}
    5%  {transform:scale(1);opacity:1;}
    11% {transform:translate(0);background-color:#39960C;}
    24% {transform:translateX(-140px);background-color:#42ae0e;}
    85% {transform:translateX(-140px);background-color:#42ae0e;}
    89% {transform:translateX(0);background-color:#39960C;}
    94% {transform:scale(1);}
    96% {transform:scale(1.1);}
    98% {transform:scale(.1);opacity:1;}
    99% {opacity:0;}
    100%{transform:scale(.1);}
  }

  @keyframes trophy_animate_opacity{
    0%{opacity:0;} 20%{opacity:0;} 24%{opacity:1;}
    90%{opacity:1;} 95%{opacity:0;} 100%{opacity:0;}
  }

  @keyframes xbox_animate_opacity{
    0%{opacity:1;} 19%{opacity:1;transform:scale3d(1,1,1);} 23%{opacity:0;}
    90%{opacity:0;} 95%{opacity:1;} 100%{opacity:1;}
  }

  @keyframes banner-animate{
    0%  {width:75px;opacity:0;}
    2%  {opacity:0;}
    4%  {opacity:1;}
    11% {width:75px;}
    24% {width:355px;}
    85% {width:355px;}
    89% {width:75px;opacity:1;}
    90% {opacity:0;}
  }

  @keyframes textSlide{
    0%  {transform:translateY(85px);opacity:0;}
    20% {transform:translateY(85px);opacity:0;}
    25% {transform:translateY(0);opacity:1;}
    79% {transform:translateY(0);opacity:1;}
    84% {transform:translateY(-115px);opacity:0;}
    100%{opacity:0;}
  }

  .animation{width:355px;height:110px;padding:5px 0;position:relative;margin:auto;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;}

  /* Auto-run: infinite loops, not triggered by a class */
  .circle          {animation:circle_grow_move 10.5s infinite;transform-origin:center;}
  .circle::before  {animation:scale_circle_1 10.5s infinite;transform-origin:center;}
  .circle::after   {animation:scale_circle_1 10.5s .1s infinite;transform-origin:center;}
  .trophy_animate  {animation:trophy_animate_opacity 10.5s infinite;}
  .xbox_img        {animation:xbox_animate_opacity 10.5s infinite;z-index:102;}
  .banner          {animation:banner-animate 10.5s infinite;}
  .achieve_disp    {animation:textSlide 10.5s infinite;}

  .circle{width:75px;height:75px;top:0;opacity:0;margin:0 auto;border-radius:100%;background:#39960C;position:relative;overflow:hidden;z-index:4;}
  .circle::before{content:"";opacity:0;width:75px;height:75px;background-color:#40a90e;position:absolute;top:0;left:0;border-radius:50%;display:block;}
  .circle::after {content:"";opacity:0;width:75px;height:75px;background-color:#32830a;position:absolute;top:0;left:0;border-radius:50%;display:block;}

  .circle .img{height:50%;left:25%;top:25%;position:absolute;z-index:100;}
  .circle .img img{height:100%;position:absolute;}
  .circle .trophy_1{animation:rotate 6s infinite;}

  .banner{width:355px;height:75px;position:relative;left:0;opacity:0;display:flex;flex-direction:column;align-items:center;justify-content:center;right:0;margin:0 auto;background:#39960C;overflow:hidden;border-radius:100px;}
  .banner-outer{display:flex;align-items:center;align-content:center;width:100%;top:-75px;position:relative;}

  .achieve_disp{display:flex;flex-direction:column;width:72%;position:absolute;justify-content:center;margin-left:92px;left:0;height:100%;top:0;}
  .achieve_disp .score_disp{width:100%;display:flex;flex-direction:row;align-items:flex-start;margin-bottom:0;}
  .achieve_disp .achiev_name{border:none;outline:none;background:none;font-size:13pt;color:#fff;line-height:24px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .acheive_score{margin-left:5px;margin-right:5px;color:#fff;}
  .unlocked{width:100%;color:#fff;font-weight:400;}
  .gamerscore{display:flex;flex-direction:row;align-items:center;height:24px;}
  .hyphen_sep{margin-right:5px;color:#fff;font-size:15pt;line-height:24px;}
</style>
</head>

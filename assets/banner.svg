<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1070 559" width="1070" height="559">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="40%" stop-color="#10101c"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aa5cc3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#aa5cc3" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="trophyBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="jellyPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aa5cc3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glowOrb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aa5cc3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#aa5cc3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="trophyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#fbbf24" flood-opacity="0.2"/>
    </filter>
    <clipPath id="roundCorners">
      <rect width="1070" height="559" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundCorners)">
    <!-- Base background -->
    <rect width="1070" height="559" fill="url(#bg)"/>

    <!-- Ambient light orbs -->
    <ellipse cx="535" cy="220" rx="400" ry="300" fill="url(#glowOrb1)"/>
    <ellipse cx="200" cy="400" rx="300" ry="250" fill="url(#glowOrb3)"/>
    <ellipse cx="870" cy="380" rx="280" ry="230" fill="url(#glowOrb2)"/>

    <!-- Subtle top purple stripe -->
    <rect x="0" y="0" width="1070" height="3" fill="url(#jellyPurple)" opacity="0.8"/>

    <!-- Floating particles -->
    <circle cx="120" cy="90" r="1.5" fill="#fbbf24" opacity="0.4"/>
    <circle cx="250" cy="150" r="1" fill="#aa5cc3" opacity="0.5"/>
    <circle cx="380" cy="60" r="1.2" fill="#60a5fa" opacity="0.3"/>
    <circle cx="500" cy="120" r="1" fill="#fbbf24" opacity="0.3"/>
    <circle cx="680" cy="80" r="1.5" fill="#aa5cc3" opacity="0.4"/>
    <circle cx="800" cy="140" r="1" fill="#34d399" opacity="0.3"/>
    <circle cx="920" cy="70" r="1.3" fill="#fbbf24" opacity="0.35"/>
    <circle cx="150" cy="450" r="1" fill="#60a5fa" opacity="0.25"/>
    <circle cx="950" cy="470" r="1.2" fill="#aa5cc3" opacity="0.3"/>
    <circle cx="780" cy="490" r="1" fill="#fbbf24" opacity="0.2"/>
    <circle cx="300" cy="500" r="1.5" fill="#34d399" opacity="0.2"/>

    <!-- ===== TROPHY ===== -->
    <g transform="translate(535, 195)" filter="url(#trophyShadow)">
      <!-- Trophy cup -->
      <path d="M-52,-65 L-52,-95 L52,-95 L52,-65 C52,-20 30,15 0,28 C-30,15 -52,-20 -52,-65 Z" fill="url(#trophyBody)" filter="url(#glow)"/>

      <!-- Trophy cup rim highlight -->
      <path d="M-50,-93 L50,-93 L50,-87 L-50,-87 Z" fill="#fef3c7" opacity="0.5"/>

      <!-- Trophy shine streak -->
      <path d="M-30,-85 L-25,-20 L-20,-85 Z" fill="white" opacity="0.15"/>

      <!-- Left handle -->
      <path d="M-52,-70 C-78,-70 -88,-45 -78,-22 C-73,-14 -60,-18 -52,-30" fill="none" stroke="url(#goldShine)" stroke-width="7" stroke-linecap="round"/>

      <!-- Right handle -->
      <path d="M52,-70 C78,-70 88,-45 78,-22 C73,-14 60,-18 52,-30" fill="none" stroke="url(#goldShine)" stroke-width="7" stroke-linecap="round"/>

      <!-- Star on trophy -->
      <polygon points="0,-60 8,-40 28,-40 12,-28 18,-8 0,-20 -18,-8 -12,-28 -28,-40 -8,-40" fill="#78350f" opacity="0.4"/>
      <polygon points="0,-58 7,-41 25,-41 11,-30 16,-12 0,-22 -16,-12 -11,-30 -25,-41 -7,-41" fill="#fef3c7" opacity="0.25"/>

      <!-- Stem -->
      <rect x="-8" y="28" width="16" height="25" rx="3" fill="url(#goldDark)"/>
      <rect x="-6" y="28" width="4" height="25" rx="2" fill="#fbbf24" opacity="0.2"/>

      <!-- Base -->
      <rect x="-30" y="53" width="60" height="10" rx="4" fill="url(#goldDark)"/>
      <rect x="-30" y="53" width="60" height="4" rx="2" fill="#fbbf24" opacity="0.15"/>
    </g>

    <!-- ===== TITLE ===== -->
    <text x="535" y="340" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-0.5" filter="url(#glow)">ACHIEVEMENT BADGES</text>

    <!-- Subtitle -->
    <text x="535" y="378" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif" font-size="20" font-weight="500" fill="#aa5cc3" letter-spacing="6" opacity="0.9">FOR JELLYFIN</text>

    <!-- Divider line -->
    <line x1="385" y1="405" x2="685" y2="405" stroke="url(#jellyPurple)" stroke-width="1" opacity="0.3"/>

    <!-- Tagline -->
    <text x="535" y="440" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" fill="#8b8fa3" letter-spacing="3">TRACK  ·  UNLOCK  ·  COMPETE</text>

    <!-- Rarity dots row -->
    <g transform="translate(535, 485)">
      <!-- Common -->
      <circle cx="-150" cy="0" r="5" fill="#9fb3c8" opacity="0.7"/>
      <text x="-150" y="20" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#9fb3c8" opacity="0.6">COMMON</text>

      <!-- Uncommon -->
      <circle cx="-75" cy="0" r="5" fill="#34d399" opacity="0.7"/>
      <text x="-75" y="20" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399" opacity="0.6">UNCOMMON</text>

      <!-- Rare -->
      <circle cx="0" cy="0" r="5" fill="#60a5fa" opacity="0.7"/>
      <text x="0" y="20" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#60a5fa" opacity="0.6">RARE</text>

      <!-- Epic -->
      <circle cx="75" cy="0" r="5" fill="#a78bfa" opacity="0.7"/>
      <text x="75" y="20" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#a78bfa" opacity="0.6">EPIC</text>

      <!-- Legendary -->
      <circle cx="150" cy="0" r="5" fill="#fbbf24" opacity="0.7" filter="url(#glow)"/>
      <text x="150" y="20" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" opacity="0.6">LEGENDARY</text>
    </g>

    <!-- Bottom border accent -->
    <rect x="0" y="556" width="1070" height="3" fill="url(#jellyPurple)" opacity="0.4"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" role="img" aria-label="Xbox-style achievement unlocked animation">
  <!--
    Literal Xbox achievement popup animation recreated in SVG.
    Adapted directly from Adam Cosman's codepen: circle grows, slides left, banner
    expands behind it, text slides up, then everything collapses back. 10.5s loop.
    Rarity color cycles through all six tiers on a 63s master loop.
  -->
  <defs>
    <linearGradient id="bannerSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="60%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>

    <radialGradient id="circleSheen" cx="32%" cy="28%" r="65%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Trophy (all white, centered) -->
    <g id="trophy">
      <path d="M -14,-16 L -14,-20 L 14,-20 L 14,-16 C 14,-5 9,4 0,8 C -9,4 -14,-5 -14,-16 Z" fill="#ffffff"/>
      <path d="M -14,-14 C -20,-14 -22,-9 -20,-4" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <path d="M 14,-14 C 20,-14 22,-9 20,-4" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <rect x="-3" y="8" width="6" height="5" fill="#ffffff"/>
      <rect x="-9" y="13" width="18" height="3" rx="1" fill="#ffffff"/>
    </g>
  </defs>

  <g transform="translate(210, 60)" font-family="'Segoe UI','Helvetica Neue',system-ui,sans-serif">

    <!-- ================= BANNER (base color) ================= -->
    <rect x="-37.5" y="-37.5" width="75" height="75" rx="37.5" ry="37.5" fill="#34d399" opacity="0">
      <animate attributeName="fill" dur="63s" repeatCount="indefinite"
        values="#34d399;#34d399;#60a5fa;#60a5fa;#a78bfa;#a78bfa;#f5b820;#f5b820;#dc3d56;#dc3d56;#9fb3c8;#9fb3c8;#34d399"
        keyTimes="0;0.166;0.1665;0.333;0.3335;0.5;0.5005;0.666;0.6665;0.833;0.8335;0.999;1"/>
      <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
        values="0;0;1;1;1;0;0"
        keyTimes="0;0.02;0.04;0.85;0.89;0.90;1"/>
      <animate attributeName="width" dur="10.5s" repeatCount="indefinite"
        values="75;75;355;355;75;75"
        keyTimes="0;0.11;0.24;0.85;0.89;1"/>
      <animate attributeName="x" dur="10.5s" repeatCount="indefinite"
        values="-37.5;-37.5;-177.5;-177.5;-37.5;-37.5"
        keyTimes="0;0.11;0.24;0.85;0.89;1"/>
    </rect>

    <!-- Banner inner highlight/shadow sheen -->
    <rect x="-37.5" y="-37.5" width="75" height="75" rx="37.5" ry="37.5" fill="url(#bannerSheen)" opacity="0" pointer-events="none">
      <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
        values="0;0;1;1;1;0;0"
        keyTimes="0;0.02;0.04;0.85;0.89;0.90;1"/>
      <animate attributeName="width" dur="10.5s" repeatCount="indefinite"
        values="75;75;355;355;75;75"
        keyTimes="0;0.11;0.24;0.85;0.89;1"/>
      <animate attributeName="x" dur="10.5s" repeatCount="indefinite"
        values="-37.5;-37.5;-177.5;-177.5;-37.5;-37.5"
        keyTimes="0;0.11;0.24;0.85;0.89;1"/>
    </rect>

    <!-- ================= TEXT (slides up into the expanded banner) ================= -->
    <g opacity="0">
      <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
        values="0;0;0;1;1;0;0"
        keyTimes="0;0.20;0.24;0.27;0.79;0.84;1"/>
      <animateTransform attributeName="transform" type="translate" dur="10.5s" repeatCount="indefinite"
        values="0 85;0 85;0 0;0 0;0 -115;0 -115"
        keyTimes="0;0.20;0.27;0.79;0.84;1"/>

      <text x="-82" y="-6" font-size="13" font-weight="500" fill="#ffffff">Rare achievement unlocked</text>
      <text x="-82" y="17" font-size="15" font-weight="800" fill="#ffffff">G 170</text>
      <text x="-52" y="17" font-size="15" font-weight="600" fill="#ffffff" opacity="0.85">&#8211;</text>
      <text x="-40" y="17" font-size="15" font-weight="700" fill="#ffffff">Achievement Badges</text>
    </g>

    <!-- ================= CIRCLE (translates left as banner expands) ================= -->
    <g>
      <animateTransform attributeName="transform" type="translate" dur="10.5s" repeatCount="indefinite"
        values="0 0;0 0;0 0;-140 0;-140 0;0 0;0 0"
        keyTimes="0;0.05;0.11;0.24;0.85;0.89;1"/>

      <!-- Lighter pulse ring (::before) -->
      <circle r="37.5" fill="#5ee5b0" opacity="0">
        <animate attributeName="fill" dur="63s" repeatCount="indefinite"
          values="#5ee5b0;#5ee5b0;#8ec3ff;#8ec3ff;#c9b4ff;#c9b4ff;#ffd358;#ffd358;#ff6b82;#ff6b82;#c0d1e0;#c0d1e0;#5ee5b0"
          keyTimes="0;0.166;0.1665;0.333;0.3335;0.5;0.5005;0.666;0.6665;0.833;0.8335;0.999;1"/>
        <animate attributeName="r" dur="10.5s" repeatCount="indefinite"
          values="0;0;62;62;62"
          keyTimes="0;0.02;0.07;0.10;1"/>
        <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
          values="0;0;0.75;0;0"
          keyTimes="0;0.02;0.055;0.10;1"/>
      </circle>

      <!-- Darker pulse ring (::after) -->
      <circle r="37.5" fill="#1d9268" opacity="0">
        <animate attributeName="fill" dur="63s" repeatCount="indefinite"
          values="#1d9268;#1d9268;#2f6cc4;#2f6cc4;#6b4ed0;#6b4ed0;#b88200;#b88200;#8b1a2d;#8b1a2d;#6b7d90;#6b7d90;#1d9268"
          keyTimes="0;0.166;0.1665;0.333;0.3335;0.5;0.5005;0.666;0.6665;0.833;0.8335;0.999;1"/>
        <animate attributeName="r" dur="10.5s" repeatCount="indefinite"
          values="0;0;62;62;62"
          keyTimes="0;0.03;0.08;0.11;1"/>
        <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
          values="0;0;0.6;0;0"
          keyTimes="0;0.03;0.065;0.11;1"/>
      </circle>

      <!-- Main circle (solid base color) -->
      <circle r="0" fill="#34d399" opacity="0">
        <animate attributeName="fill" dur="63s" repeatCount="indefinite"
          values="#34d399;#34d399;#60a5fa;#60a5fa;#a78bfa;#a78bfa;#f5b820;#f5b820;#dc3d56;#dc3d56;#9fb3c8;#9fb3c8;#34d399"
          keyTimes="0;0.166;0.1665;0.333;0.3335;0.5;0.5005;0.666;0.6665;0.833;0.8335;0.999;1"/>
        <animate attributeName="r" dur="10.5s" repeatCount="indefinite"
          values="0;0;41;37.5;37.5;37.5;41;0;0"
          keyTimes="0;0.01;0.04;0.05;0.95;0.96;0.97;0.98;1"/>
        <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
          values="0;0;1;1;1;0"
          keyTimes="0;0.01;0.04;0.97;0.99;1"/>
      </circle>

      <!-- Radial sheen on circle for 3D sphere look -->
      <circle r="0" fill="url(#circleSheen)" opacity="0" pointer-events="none">
        <animate attributeName="r" dur="10.5s" repeatCount="indefinite"
          values="0;0;37.5;37.5;37.5;0"
          keyTimes="0;0.04;0.05;0.95;0.97;1"/>
        <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
          values="0;0;1;1;0"
          keyTimes="0;0.04;0.06;0.96;1"/>
      </circle>

      <!-- Trophy (rotates continuously while visible) -->
      <g opacity="0">
        <animate attributeName="opacity" dur="10.5s" repeatCount="indefinite"
          values="0;0;1;1;0;0"
          keyTimes="0;0.04;0.06;0.95;0.98;1"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
          <g transform="scale(1.2)">
            <use href="#trophy"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>

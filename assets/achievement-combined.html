<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Achievement Badges — Regular</title>
<style>
  html,body{height:100%;margin:0;background:#111;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .achievement *{box-sizing:border-box;}
  .achievement{position:relative;pointer-events:none;width:100%;}

  /* ── ORIGINAL CODEPEN KEYFRAMES (untouched for smoothness) ── */

  @keyframes rotate{
    0%{transform:rotateY(0deg);}
    50%{transform:rotateY(360deg);}
    100%{transform:rotateY(0deg);}
  }

  @keyframes scale_circle_1{
    0%  {transform:scale3d(0,0,0);}
    2%  {opacity:1;}
    5%  {transform:scale3d(1,1,1);opacity:.8;}
    6%  {opacity:0;}
    9%  {opacity:0;}
    10% {transform:scale3d(1,1,1);opacity:0;}
    90% {transform:scale3d(0,0,0);}
    92% {opacity:1;}
    95% {transform:scale3d(1,1,1);opacity:.8;}
    96% {opacity:0;}
    99% {opacity:0;}
    100%{transform:scale3d(1,1,1);opacity:0;}
  }

  @keyframes circle_grow_move{
    1%  {opacity:0;transform:scale(.1);}
    4%  {transform:scale(1.1);}
    5%  {transform:scale(1);opacity:1;}
    11% {transform:translate(0);background-color:#2B7A0B;}
    24% {transform:translateX(-140px);background-color:#3DA40E;}
    85% {transform:translateX(-140px);background-color:#3DA40E;}
    89% {transform:translateX(0);background-color:#2B7A0B;}
    94% {transform:scale(1);}
    96% {transform:scale(1.1);}
    98% {transform:scale(.1);opacity:1;}
    99% {opacity:0;}
    100%{transform:scale(.1);}
  }

  @keyframes trophy_animate_opacity{
    0%{opacity:0;} 20%{opacity:0;} 24%{opacity:1;}
    90%{opacity:1;} 95%{opacity:0;} 100%{opacity:0;}
  }

  @keyframes xbox_animate_opacity{
    0%{opacity:1;} 19%{opacity:1;transform:scale3d(1,1,1);} 23%{opacity:0;}
    90%{opacity:0;} 95%{opacity:1;} 100%{opacity:1;}
  }

  @keyframes banner_animate{
    0%  {width:75px;opacity:0;}
    2%  {opacity:0;}
    4%  {opacity:1;}
    11% {width:75px;}
    24% {width:355px;}
    85% {width:355px;}
    89% {width:75px;opacity:1;}
    90% {opacity:0;}
  }

  @keyframes banner_color{
    0%  {background-color:#245E07;}
    11% {background-color:#245E07;}
    24% {background-color:#317D0A;}
    85% {background-color:#317D0A;}
    89% {background-color:#245E07;}
    100%{background-color:#245E07;}
  }

  @keyframes textSlide{
    0%  {transform:translateY(85px);opacity:0;}
    20% {transform:translateY(85px);opacity:0;}
    25% {transform:translateY(0);opacity:1;}
    79% {transform:translateY(0);opacity:1;}
    84% {transform:translateY(-115px);opacity:0;}
    100%{opacity:0;}
  }

  /* Shimmer: diagonal white gleam sweeps across the expanded banner */
  @keyframes shimmerSweep{
    0%,27%{left:-60%;opacity:0;}
    30%{left:-60%;opacity:.8;}
    47%{left:160%;opacity:.8;}
    48%,100%{left:160%;opacity:0;}
  }
  .shimmer{
    position:absolute;top:0;bottom:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(115deg,
      transparent 30%,
      rgba(255,255,255,0.10) 42%,
      rgba(255,255,255,0.42) 50%,
      rgba(255,255,255,0.10) 58%,
      transparent 70%);
    transform:skewX(-18deg);opacity:0;
    animation:shimmerSweep 10.5s infinite;
    pointer-events:none;z-index:10;
  }

  

  /* ── Layout ── */
  .animation{
    width:355px;height:110px;padding:5px 0;
    position:relative;margin:auto;
    display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  }

  /* Auto-run infinite */
  .circle            {animation:circle_grow_move 10.5s infinite;transform-origin:center;}
  .circle::before    {animation:scale_circle_1 10.5s infinite;transform-origin:center;animation-iteration-count:2;}
  .circle::after     {animation:scale_circle_1 10.5s .1s infinite;transform-origin:center;}
  .trophy_animate    {animation:trophy_animate_opacity 10.5s infinite;}
  .xbox_img          {animation:xbox_animate_opacity 10.5s infinite;z-index:102;}
  .banner            {animation:banner_animate 10.5s infinite, banner_color 10.5s infinite;}
  .achieve_disp      {animation:textSlide 10.5s infinite;}

  /* ── Circle with sphere gradient for depth ── */
  .circle{
    width:75px;height:75px;top:0;opacity:0;margin:0 auto;
    border-radius:100%;
    background-color:#2B7A0B;
    background-image:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.10) 28%, transparent 56%),
      radial-gradient(circle at 72% 80%, rgba(0,0,0,0.25) 0%, transparent 52%);
    position:relative;overflow:hidden;z-index:4;
    box-shadow:0 4px 14px rgba(0,0,0,0.45), inset 0 1px 3px rgba(255,255,255,0.12);
  }
  .circle::before{
    content:"";opacity:0;width:75px;height:75px;
    background-color:#50C820;
    position:absolute;top:0;left:0;border-radius:50%;display:block;
  }
  .circle::after{
    content:"";opacity:0;width:75px;height:75px;
    background-color:#1A5A05;
    position:absolute;top:0;left:0;border-radius:50%;display:block;
  }
  .circle .img{height:50%;left:25%;top:25%;position:absolute;z-index:100;}
  .circle .img img{height:100%;position:absolute;}
  .circle .trophy_1{animation:rotate 6s infinite;}

  /* ── Banner with gradient depth ── */
  .banner{
    width:355px;height:75px;position:relative;left:0;opacity:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    right:0;margin:0 auto;
    background-color:#245E07;
    background-image:
      linear-gradient(90deg, rgba(0,0,0,.20) 0%, transparent 14%, transparent 86%, rgba(0,0,0,.20) 100%),
      linear-gradient(180deg, rgba(255,255,255,.20) 0%, rgba(255,255,255,.05) 30%, transparent 55%, rgba(0,0,0,.20) 100%);
    overflow:hidden;border-radius:100px;
    box-shadow:0 6px 20px rgba(0,0,0,0.50);
  }
  .banner-outer{
    display:flex;align-items:center;align-content:center;
    width:100%;top:-75px;position:relative;
  }

  /* ── Text ── */
  .achieve_disp{
    display:flex;flex-direction:column;width:72%;
    position:absolute;justify-content:center;
    margin-left:92px;left:0;height:100%;top:0;
  }
  .achieve_disp .score_disp{
    width:100%;display:flex;flex-direction:row;
    align-items:center;margin-bottom:0;
  }
  .achieve_disp .achiev_name{
    border:none;outline:none;background:none;
    font-size:12.5pt;color:#fff;line-height:24px;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    font-weight:500;
  }
  .acheive_score{margin-left:4px;margin-right:4px;color:#fff;font-weight:600;font-size:12.5pt;}
  .unlocked{
    width:100%;color:rgba(255,255,255,.88);
    font-weight:500;font-size:10.5px;
    letter-spacing:1.4px;text-transform:uppercase;
  }
  .gamerscore{display:flex;flex-direction:row;align-items:center;height:24px;}
  .gamerscore img{opacity:.88;}
  .hyphen_sep{margin:0 4px;color:rgba(255,255,255,.55);font-size:13pt;line-height:24px;}
</style>
</head>
